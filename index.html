<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robo-Burger · แผงควบคุมการจัดส่ง</title>

  <!-- roslibjs : ไลบรารีคุยกับ ROS ผ่าน rosbridge websocket -->
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #fff6ea;
      --cream-2: #ffefdb;
      --ink: #3a2c20;
      --ink-soft: #7a6a5b;
      --ink-faint: #a99685;
      --card: #ffffff;
      --line: #f1e4d2;

      --orange: #ff7a1a;
      --orange-d: #f25c05;
      --blue: #38b6ff;
      --yellow: #ffc83d;
      --green: #3ec98a;
      --pink: #ff6b8a;
      --purple: #9b8cff;

      --green-on: #2bb673;
      --red: #ff5d5d;

      --radius: 26px;
      --shadow: 0 16px 36px rgba(214,150,80,.18);
      --shadow-sm: 0 8px 20px rgba(214,150,80,.14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Nunito", -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      position: relative;
      overflow-x: hidden;
    }
    /* บลॉบประดับพื้นหลังแบบสนามเด็กเล่น */
    .blob { position: fixed; border-radius: 50%; filter: blur(8px); opacity: .35; z-index: 0; pointer-events: none; }
    .blob.b1 { width: 320px; height: 320px; background: #ffd9a8; top: -90px; right: -70px; }
    .blob.b2 { width: 260px; height: 260px; background: #bfe9ff; bottom: -80px; left: -70px; }
    .blob.b3 { width: 180px; height: 180px; background: #ffd0dc; top: 40%; right: -60px; opacity: .3; }

    h1, h2, h3, .display { font-family: "Fredoka", "Nunito", sans-serif; }

    .app { position: relative; z-index: 1; max-width: 880px; margin: 0 auto; padding: 26px 18px 52px; }

    /* ---------- Top bar ---------- */
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .logo {
      width: 56px; height: 56px; flex: none; border-radius: 20px;
      display: grid; place-items: center; font-size: 30px;
      background: linear-gradient(140deg, #ffb347, var(--orange));
      box-shadow: 0 10px 22px rgba(255,122,26,.4);
      transform: rotate(-4deg);
    }
    .brand h1 { font-size: 24px; font-weight: 700; margin: 0; color: var(--ink); letter-spacing: .3px; }
    .brand p { font-size: 13px; color: var(--ink-soft); margin: 2px 0 0; font-weight: 600; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 9px; flex: none;
      padding: 10px 16px; border-radius: 999px; background: var(--card);
      border: 2px solid var(--line); box-shadow: var(--shadow-sm);
      font-size: 13.5px; font-weight: 800; color: var(--ink-soft); white-space: nowrap;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); transition: background .25s; }
    .dot.on { background: var(--green-on); animation: pulse 1.8s infinite; }
    .dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(43,182,115,.5); }
      70% { box-shadow: 0 0 0 9px rgba(43,182,115,0); }
      100% { box-shadow: 0 0 0 0 rgba(43,182,115,0); }
    }

    /* ---------- Cards ---------- */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 2px solid #fff; }
    .card + .card { margin-top: 18px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 18px 22px 0; }
    .card-head h2 { font-size: 17px; font-weight: 600; margin: 0; color: var(--ink); }
    .hint { font-size: 12.5px; color: var(--ink-faint); font-weight: 700; }
    .card-body { padding: 16px 22px 22px; }

    /* ---------- Connection ---------- */
    .conn-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .field { flex: 1; min-width: 210px; }
    .field label { display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 7px; font-weight: 800; }
    .field input {
      width: 100%; background: var(--cream); color: var(--ink);
      border: 2px solid var(--line); border-radius: 16px;
      padding: 13px 15px; font-size: 14.5px; font-family: inherit; font-weight: 600;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .field input:focus { outline: none; border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(56,182,255,.18); }
    .field input:disabled { opacity: .6; }

    .btn {
      border: none; border-radius: 999px; cursor: pointer; font-family: "Fredoka", sans-serif;
      font-weight: 600; font-size: 15px; padding: 13px 26px; color: #fff;
      background: linear-gradient(135deg, #4fc1ff, var(--blue));
      box-shadow: 0 8px 18px rgba(56,182,255,.4);
      transition: transform .07s, filter .15s, box-shadow .15s;
    }
    .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }
    .btn.danger { background: linear-gradient(135deg, #ff8a8a, var(--red)); box-shadow: 0 8px 18px rgba(255,93,93,.38); }
    .btn.ghost { background: var(--cream); color: var(--ink-soft); box-shadow: none; border: 2px solid var(--line); font-family: "Nunito"; font-weight: 800; }

    /* ---------- Stations grid ---------- */
    .stations { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; }
    .station {
      --c: var(--orange);
      position: relative; text-align: left; cursor: pointer; overflow: hidden;
      background: var(--card); border: 2px solid var(--line); border-radius: 22px;
      padding: 18px; color: var(--ink); font-family: inherit;
      display: flex; flex-direction: column; gap: 9px;
      transition: transform .12s cubic-bezier(.34,1.56,.64,1), border-color .15s, box-shadow .2s, opacity .15s;
    }
    .station::after { /* แถบสีน่ารักด้านล่างการ์ด */
      content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 6px; background: var(--c);
      opacity: .85;
    }
    .station:hover:not(:disabled) { transform: translateY(-5px) rotate(-.5deg); border-color: var(--c); box-shadow: 0 18px 32px rgba(214,150,80,.25); }
    .station:active:not(:disabled) { transform: translateY(-2px) scale(.99); }
    .station:disabled { opacity: .5; cursor: not-allowed; }
    .station .pin {
      width: 48px; height: 48px; border-radius: 16px; flex: none;
      display: grid; place-items: center; font-size: 22px; font-weight: 700;
      font-family: "Fredoka", sans-serif; color: #fff;
      background: var(--c); box-shadow: 0 8px 16px color-mix(in srgb, var(--c) 45%, transparent);
    }
    .station .name { font-size: 18px; font-weight: 700; font-family: "Fredoka", sans-serif; }
    .station .desc { font-size: 13px; color: var(--ink-soft); margin-top: -4px; font-weight: 600; }
    .station .code {
      margin-top: 2px; font-size: 11px; color: var(--ink-faint); font-weight: 800;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .station.active { border-color: var(--c); box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 35%, transparent), var(--shadow-sm); }
    .station .badge {
      position: absolute; top: 14px; right: 14px;
      font-size: 11px; font-weight: 800; color: #fff; background: var(--c);
      padding: 3px 10px; border-radius: 999px;
      opacity: 0; transform: scale(.8); transition: opacity .2s, transform .2s;
    }
    .station.active .badge { opacity: 1; transform: scale(1); }

    /* ปุ่ม Home เต็มแถว */
    .home-btn {
      width: 100%; margin-top: 16px; cursor: pointer; font-family: "Fredoka", sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 17px; border-radius: 20px; border: none;
      background: linear-gradient(135deg, #ffd66b, var(--yellow));
      color: #6a4e10; font-size: 17px; font-weight: 600;
      box-shadow: 0 10px 22px rgba(255,200,61,.45);
      transition: transform .1s, filter .15s, opacity .15s;
    }
    .home-btn:hover:not(:disabled) { filter: brightness(1.04); transform: translateY(-2px); }
    .home-btn:active:not(:disabled) { transform: translateY(1px); }
    .home-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ---------- Dispatch banner ---------- */
    .dispatch {
      display: flex; align-items: center; gap: 13px;
      padding: 15px 18px; border-radius: 18px;
      background: linear-gradient(135deg, #fff3e0, var(--cream-2));
      border: 2px dashed #ffd9a8; font-size: 14.5px; color: var(--ink-soft); margin-bottom: 18px; font-weight: 700;
    }
    .dispatch b { color: var(--ink); font-weight: 800; }
    .dispatch .ic { font-size: 22px; }

    /* ---------- Log ---------- */
    .log {
      background: var(--cream); border-radius: 16px; border: 2px solid var(--line);
      padding: 14px; height: 150px; overflow-y: auto;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px;
      color: var(--ink-soft); white-space: pre-wrap; word-break: break-word; font-weight: 600;
    }
    .log div { padding: 1.5px 0; }
    .log .ok { color: var(--green-on); }
    .log .err { color: var(--red); }
    .log .tx { color: var(--orange-d); }
    .log .t { color: var(--ink-faint); }

    footer { text-align: center; color: var(--ink-faint); font-size: 12.5px; margin-top: 24px; font-weight: 700; }
    footer code { background: #fff; padding: 2px 7px; border-radius: 8px; border: 1px solid var(--line); }

    @media (max-width: 520px) {
      .brand h1 { font-size: 20px; }
      .logo { width: 48px; height: 48px; font-size: 26px; }
      .status-pill { padding: 8px 12px; font-size: 12.5px; }
      .stations { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .card-body, .card-head { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
  <span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span>

  <div class="app">

    <!-- ===== Top bar ===== -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">🍔</div>
        <div>
          <h1>Robo-Burger Delivery</h1>
          <p>แผงควบคุมการจัดส่งสุดสนุก · ROS 2</p>
        </div>
      </div>
      <div class="status-pill">
        <span id="dot" class="dot"></span>
        <span id="statusText">ออฟไลน์</span>
      </div>
    </header>

    <!-- ===== Connection ===== -->
    <section class="card">
      <div class="card-head">
        <h2>🔌 การเชื่อมต่อ</h2>
        <span id="connInfo" class="hint"></span>
      </div>
      <div class="card-body">
        <div class="conn-row">
          <div class="field">
            <label for="url">rosbridge WebSocket URL</label>
            <input id="url" value="ws://localhost:9090" autocapitalize="off" autocomplete="off" spellcheck="false" />
          </div>
          <button id="connectBtn" class="btn">เชื่อมต่อ</button>
        </div>
      </div>
    </section>

    <!-- ===== Stations ===== -->
    <section class="card">
      <div class="card-head">
        <h2>📍 เลือกจุดหมายปลายทาง</h2>
        <span class="hint">แตะการ์ดเพื่อสั่งจัดส่ง</span>
      </div>
      <div class="card-body">
        <div id="dispatch" class="dispatch">
          <span>ยังไม่มีคำสั่งจัดส่ง — เชื่อมต่อแล้วเลือกจุดหมายเพื่อเริ่มได้เลย!</span>
        </div>
        <div id="stations" class="stations"><!-- สร้างด้วย JS --></div>
        <button id="homeBtn" class="home-btn" disabled>
          <span style="font-size:21px">🏠</span> กลับสู่จุดเริ่มต้น (Home)
        </button>
      </div>
    </section>

    <!-- ===== Log ===== -->
    <section class="card">
      <div class="card-head">
        <h2>📝 บันทึกการทำงาน</h2>
        <button id="clearLog" class="btn ghost" style="padding:7px 16px;font-size:13px">ล้าง</button>
      </div>
      <div class="card-body">
        <div id="log" class="log"></div>
      </div>
    </section>

    <footer>Robo-Burger Delivery · ส่งคำสั่งผ่าน topic <code id="topicName"></code> (std_msgs/String)</footer>
  </div>

  <script>
    /* ============================================================
       การตั้งค่า — แก้จุดหมายปลายทางได้ที่นี่ที่เดียว
       เพิ่ม/ลบจุดได้อิสระ แค่ใส่ออบเจกต์ในอาเรย์ LOCATIONS
       ฝั่ง Python Commander ต้องอ่าน msg.data แล้ว map เป็นพิกัดเอง
       ============================================================ */
    const COMMAND_TOPIC = '/web_command';
    const COMMAND_TYPE  = 'std_msgs/String';

    const LOCATIONS = [
      { id: 'A', command: 'GO_A', name: 'จุด A', desc: 'โซนหน้าร้าน / โต๊ะ A', color: '#ff7a1a' },
      { id: 'B', command: 'GO_B', name: 'จุด B', desc: 'โซนกลาง / โต๊ะ B',     color: '#38b6ff' },
      { id: 'C', command: 'GO_C', name: 'จุด C', desc: 'โซนใน / โต๊ะ C',       color: '#3ec98a' },
    ];
    const HOME_COMMAND = 'GO_HOME';

    /* ---------- อ้างอิง element ---------- */
    const $ = (id) => document.getElementById(id);
    const dot = $('dot'), statusText = $('statusText'), connInfo = $('connInfo');
    const urlInput = $('url'), connectBtn = $('connectBtn');
    const stationsEl = $('stations'), homeBtn = $('homeBtn');
    const dispatchEl = $('dispatch'), logBox = $('log');
    $('topicName').textContent = COMMAND_TOPIC;

    let ros = null, cmdTopic = null, connected = false;

    /* ---------- log ---------- */
    function log(msg, cls = '') {
      const t = new Date().toLocaleTimeString('th-TH');
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.innerHTML = `<span class="t">[${t}]</span> ` + msg.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
      logBox.appendChild(line);
      logBox.scrollTop = logBox.scrollHeight;
    }

    /* ---------- สร้างการ์ดจุดหมายจาก LOCATIONS ---------- */
    LOCATIONS.forEach(loc => {
      const btn = document.createElement('button');
      btn.className = 'station';
      btn.disabled = true;
      btn.dataset.command = loc.command;
      if (loc.color) btn.style.setProperty('--c', loc.color);
      btn.innerHTML = `
        <span class="badge">กำลังไป</span>
        <div class="pin">${loc.id}</div>
        <div class="name">${loc.name}</div>
        <div class="desc">${loc.desc}</div>
        <div class="code">${loc.command}</div>`;
      btn.addEventListener('click', () => sendCommand(loc.command, loc.name, btn));
      stationsEl.appendChild(btn);
    });

    function allStationButtons() { return [...stationsEl.querySelectorAll('.station')]; }

    /* ---------- สถานะ UI ---------- */
    function setStatus(state) { // 'offline' | 'connecting' | 'online'
      connected = state === 'online';
      dot.className = 'dot' + (state === 'online' ? ' on' : state === 'connecting' ? ' connecting' : '');
      statusText.textContent = state === 'online' ? 'ออนไลน์' : state === 'connecting' ? 'กำลังเชื่อมต่อ…' : 'ออฟไลน์';
      connectBtn.textContent = state === 'online' ? 'ตัดการเชื่อมต่อ' : 'เชื่อมต่อ';
      connectBtn.className = 'btn' + (state === 'online' ? ' danger' : '');
      allStationButtons().forEach(b => b.disabled = !connected);
      homeBtn.disabled = !connected;
      urlInput.disabled = state !== 'offline';
    }

    function markActive(activeBtn) {
      allStationButtons().forEach(b => b.classList.toggle('active', b === activeBtn));
    }

    function setDispatch(name, command) {
      dispatchEl.innerHTML =
        `<span class="ic">🚚</span><span>กำลังจัดส่งไปยัง <b>${name}</b> · คำสั่ง <b>${command}</b> · ${new Date().toLocaleTimeString('th-TH')}</span>`;
    }

    /* ---------- เชื่อมต่อ rosbridge ---------- */
    function connect() {
      const url = urlInput.value.trim();
      if (!url) { log('กรุณากรอก rosbridge URL', 'err'); return; }
      setStatus('connecting');
      log('กำลังเชื่อมต่อ ' + url + ' …');
      ros = new ROSLIB.Ros({ url });

      ros.on('connection', () => {
        log('เชื่อมต่อสำเร็จ', 'ok');
        setStatus('online');
        connInfo.textContent = url;
        cmdTopic = new ROSLIB.Topic({ ros, name: COMMAND_TOPIC, messageType: COMMAND_TYPE });
      });
      ros.on('error', () => { log('เชื่อมต่อล้มเหลว — ตรวจ rosbridge และ URL', 'err'); });
      ros.on('close', () => {
        log('ตัดการเชื่อมต่อแล้ว', 'err');
        setStatus('offline'); connInfo.textContent = ''; cmdTopic = null;
        markActive(null);
      });
    }
    function disconnect() { if (ros) ros.close(); }

    /* ---------- ส่งคำสั่ง ---------- */
    function sendCommand(command, label, btn = null) {
      if (!connected || !cmdTopic) { log('ยังไม่ได้เชื่อมต่อ — ส่งคำสั่งไม่ได้', 'err'); return; }
      cmdTopic.publish(new ROSLIB.Message({ data: command }));
      log(`ส่งคำสั่ง → ${command}  (${label})`, 'tx');
      markActive(btn);          // null = ปุ่ม Home → ไม่ไฮไลต์การ์ดจุดหมาย
      setDispatch(label, command);
    }

    /* ---------- events ---------- */
    connectBtn.addEventListener('click', () => connected ? disconnect() : connect());
    homeBtn.addEventListener('click', () => sendCommand(HOME_COMMAND, 'จุดเริ่มต้น (Home)', null));
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
    $('clearLog').addEventListener('click', () => { logBox.innerHTML = ''; });

    /* ---------- init ---------- */
    setStatus('offline');
    log('พร้อมใช้งาน · กด “เชื่อมต่อ” เพื่อเริ่ม');
  </script>
</body>
</html>
